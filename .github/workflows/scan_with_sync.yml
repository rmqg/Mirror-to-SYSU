name: Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: pip install requests

      - run: python repo_scanner.py
        env:
          GHP_TOKEN: ${{ secrets.GHP_TOKEN_CUSTOM }}

      - uses: actions/upload-artifact@v4
        with:
          name: repos
          path: repos.txt

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: repos

      - run: pip install requests

      - name: Ensure GitLab repo exists
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_NAMESPACE: RenAhsAcme
          GITLAB_NAMESPACE_ID: 12
        run: |
          set -e

          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          GITLAB_API="https://git.sysu.edu.cn/api/v4"

          echo "Checking GitLab repo: $REPO_NAME"

          # URL encode
          PROJECT_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$GITLAB_NAMESPACE/$REPO_NAME', safe=''))")

          EXISTS=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            "$GITLAB_API/projects/$PROJECT_PATH")

          if echo "$EXISTS" | jq -e '.id' > /dev/null; then
            echo "Repo exists"
          else
            echo "Creating repo..."

            curl --request POST \
              --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              --data "name=$REPO_NAME" \
              --data "namespace_id=$GITLAB_NAMESPACE_ID" \
              "$GITLAB_API/projects"
          fi
          
      - run: python sync_engine.py
        env:
          GHP_USERNAME: ${{ secrets.GHP_USERNAME }}
          GHP_TOKEN: ${{ secrets.GHP_TOKEN_CUSTOM }}
          GITLAB_URL: https://git.sysu.edu.cn
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}

