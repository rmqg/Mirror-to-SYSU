name: Scan & Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install requests

      - name: Scan repos
        run: python repo_scanner.py
        env:
          GHP_TOKEN: ${{ secrets.GHP_TOKEN_CUSTOM }}

      - name: Ensure GitLab repos + Sync
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_NAMESPACE: RenAhsAcme
          GHP_USERNAME: ${{ secrets.GHP_USERNAME }}
          GHP_TOKEN: ${{ secrets.GHP_TOKEN_CUSTOM }}
          GITLAB_URL: https://git.sysu.edu.cn
        run: |
          set -e

          GITLAB_API="$GITLAB_URL/api/v4"

          echo "===== START PROCESSING REPOS ====="

          while read repo; do
            
            if [ -z "$repo" ]; then
              continue
            fi

            REPO_NAME="$repo"

            echo "----- Processing $REPO_NAME -----"

            # URL encode
            PROJECT_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$GITLAB_NAMESPACE/' + '$REPO_NAME', safe=''))")

            EXISTS=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              "$GITLAB_API/projects/$PROJECT_PATH")

            if echo "$EXISTS" | jq -e '.id' > /dev/null 2>&1; then
              echo "Repo exists on GitLab"
            else
              echo "Creating GitLab repo..."

              curl -s --request POST \
                --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
                --data "name=$REPO_NAME" \
                "$GITLAB_API/projects" || true
            fi

            echo "Syncing..."

            rm -rf "$REPO_NAME.git"
            
            git lfs install --skip-smudge

            git config --global core.compression 0
            git config --global pack.threads 1
            git config --global http.postBuffer 524288000
            git config --global http.lowSpeedLimit 0
            git config --global http.lowSpeedTime 999999

            echo "Detecting default branch..."

            DEFAULT_BRANCH=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              "$GITLAB_API/projects/$PROJECT_PATH" | jq -r '.default_branch')

            if [ "$DEFAULT_BRANCH" = "null" ] || [ -z "$DEFAULT_BRANCH" ]; then
              DEFAULT_BRANCH="main"
            fi

            echo "Default branch: $DEFAULT_BRANCH"

            echo "Unprotecting branch (if exists)..."

            curl -s --request DELETE \
              --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              "$GITLAB_API/projects/$PROJECT_PATH/protected_branches/$DEFAULT_BRANCH" \
              || true

            GIT_LFS_SKIP_SMUDGE=1 git clone --bare --progress https://$GHP_USERNAME:$GHP_TOKEN@github.com/$GHP_USERNAME/$REPO_NAME.git
            
            cd "$REPO_NAME.git"

            git remote remove gitlab 2>/dev/null || true

            git remote add gitlab https://oauth2:$GITLAB_TOKEN@git.sysu.edu.cn/$GITLAB_NAMESPACE/$REPO_NAME.git

            echo "Fetching LFS ..."

            git lfs fetch origin --all || true
            
            git push --mirror gitlab || true

            echo "Pushing LFS ..."

            git lfs push --all gitlab || true

            cd ..
            rm -rf "$REPO_NAME.git"

            echo "Done $REPO_NAME"

          done < repos.txt

          echo "===== ALL DONE ====="
